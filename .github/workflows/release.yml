name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') }}
    runs-on: ubuntu-latest
    concurrency:
      group: release-main
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version in manifest and HACS metadata
        id: bump
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          manifest_path = Path("custom_components/switch_for_time/manifest.json")
          hacs_path = Path("hacs.json")

          manifest = json.loads(manifest_path.read_text())
          current = manifest["version"]
          match = re.fullmatch(r"(\d+)\.(\d+)\.(\d+)", current)
          if not match:
              raise ValueError(
                  f"Invalid version format in custom_components/switch_for_time/manifest.json. "
                  f"Found: '{current}'. Expected: 'MAJOR.MINOR.PATCH' (e.g., '1.2.3')."
              )
          major, minor, patch = match.groups()
          new_version = f"{major}.{minor}.{int(patch) + 1}"

          manifest["version"] = new_version
          hacs = json.loads(hacs_path.read_text())
          hacs["version"] = new_version

          manifest_path.write_text(json.dumps(manifest, indent=2) + "\n")
          hacs_path.write_text(json.dumps(hacs, indent=2) + "\n")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"version={new_version}\n")
          PY

      - name: Commit and tag release
        id: release_commit
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git add custom_components/switch_for_time/manifest.json hacs.json
          if git diff --cached --quiet; then
            echo "No release changes to commit"
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(release): v${VERSION} [skip release]"
          git tag "v${VERSION}"
          if ! git push --atomic origin main "v${VERSION}"; then
            git fetch origin main --tags
            if git rev-parse -q --verify "refs/tags/v${VERSION}" >/dev/null; then
              echo "Release tag v${VERSION} already exists on origin."
              echo "Check existing releases before re-running this workflow."
            elif [ "$(git rev-parse HEAD~1)" != "$(git rev-parse origin/main)" ]; then
              echo "origin/main advanced during release."
              echo "Re-run this workflow from the latest main commit."
            else
              echo "Atomic push failed for an unexpected reason. Re-run the workflow."
            fi
            exit 1
          fi
          echo "released=true" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: ${{ steps.release_commit.outputs.released == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          generate_release_notes: true
