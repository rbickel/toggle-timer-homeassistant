name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') }}
    runs-on: ubuntu-latest
    concurrency:
      group: release-main
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version in manifest and package metadata
        id: bump
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          manifest_path = Path("custom_components/toggle_timer/manifest.json")
          package_path = Path("package.json")
          types_path = Path("src/types.ts")

          manifest = json.loads(manifest_path.read_text())
          current = manifest["version"]
          # Match semantic version with optional pre-release tag (e.g., 1.2.3-beta, 1.2.3-alpha.1, 1.2.3-rc.2)
          match = re.fullmatch(r"(\d+)\.(\d+)\.(\d+)(?:-([a-zA-Z0-9.-]+))?", current)
          if not match:
              raise ValueError(
                  f"Invalid version format in custom_components/toggle_timer/manifest.json. "
                  f"Found: '{current}'. Expected: 'MAJOR.MINOR.PATCH' or 'MAJOR.MINOR.PATCH-prerelease' (e.g., '1.2.3' or '1.2.3-beta')."
              )
          major, minor, patch, prerelease = match.groups()
          # Increment patch version and drop pre-release tag for releases
          new_version = f"{major}.{minor}.{int(patch) + 1}"

          manifest["version"] = new_version
          package = json.loads(package_path.read_text())
          package["version"] = new_version
          types = types_path.read_text()
          types = re.sub(
              r"export const CARD_VERSION = '[^']+';",
              f"export const CARD_VERSION = '{new_version}';",
              types,
              count=1,
          )

          manifest_path.write_text(json.dumps(manifest, indent=2) + "\n")
          package_path.write_text(json.dumps(package, indent=2) + "\n")
          types_path.write_text(types)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"version={new_version}\n")
          PY

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Refresh npm lockfile
        run: npm install --package-lock-only

      - name: Install npm dependencies
        run: npm ci

      - name: Rebuild frontend assets
        run: npm run build

      - name: Run hassfest
        # 1.0.0 fails with ModuleNotFoundError for script.hassfest; pin a known-good
        # current commit until Home Assistant publishes a newer working tag.
        uses: home-assistant/actions/hassfest@f6f29a7ee3fa0eccadf3620a7b9ee00ab54ec03b

      - name: Run HACS validation
        uses: hacs/action@22.5.0
        with:
          category: integration
          ignore: brands description topics

      - name: Commit and tag release
        id: release_commit
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git add \
            custom_components/toggle_timer/manifest.json \
            package-lock.json \
            package.json \
            src/types.ts \
            dist/toggle-timer-card.js \
            custom_components/toggle_timer/www/toggle-timer-card.js
          if git diff --cached --quiet; then
            echo "No release changes to commit"
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(release): v${VERSION} [skip release]"
          git tag "v${VERSION}"
          if ! git push --atomic origin main "v${VERSION}"; then
            git fetch origin main --tags
            if git rev-parse -q --verify "refs/tags/v${VERSION}" >/dev/null; then
              echo "Release tag v${VERSION} already exists on origin."
              echo "Check existing releases before re-running this workflow."
            elif [ "$(git rev-parse HEAD~1)" != "$(git rev-parse origin/main)" ]; then
              echo "origin/main advanced during release."
              echo "Re-run this workflow from the latest main commit."
            else
              echo "Atomic push failed for an unexpected reason. Re-run the workflow."
            fi
            exit 1
          fi
          echo "released=true" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: ${{ steps.release_commit.outputs.released == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          generate_release_notes: true
